					OVERVIEW
					overview
					<br>
					<p class="text">
						Personal Emotions Tracker or PET is a mobile personal mental health tracking app that offers a conversational interaction mode to infer user's mental states as well as a visible externalization of their mood. Users will interact primarily with an animal “avatar” of themselves in the form of an animal or creature that they choose and personalize. The idea is to give the users a feeling of ownership over their mental health and a tangible motivation for behavior change in order to improve mental health continuously.
					</p>
					<p class="info">
						<span class="title3">client: </span>Graduate Course
						<br><span class="title3">when: </span>Oct-Dec 2021

						<br><span class="title3">process: </span>Conception, Persona Development, Storyboarding, Wireframing, Iteration, High-Fidelity Prototype
						<br><span class="title3">tools: </span>Figma
					</p>

					TARGET AUDIENCE AND PERSONAS
					target audience and personas
					<br>
					<p class="text">
						The target users of PET can be characterized in the following ways:
						<br>1. Those individuals who seek to track their emotional states over time
						<br>2. Those individuals who may (or may not) have inconsistent abilities to interact with a mood tracking app
						<br>3. Those individuals who seek an outlet to express their emotions or find companionship on an emotional basis
						<br>4. Those individuals who seek to customize or personalize their mood tracking experience
					</p>

					<div class="row" style="text-align: center;">
						<img src="../../files/pet/target users.png" alt="" width="80%">
					</div>
					<p class="text">
						The personas outlined below depict key attributes of the target audience:<br><br>
					</p>
					<div class="row">
						<img src="../../files/pet/Persona 1.png" alt="" width="100%">
					</div><br>
					<div class="row">
						<img src="../../files/pet/Persona 2.png" alt="" width="100%">
					</div>
				</li>
				<li><br>
					STORYBOARD
					storyboard
					<br>
					<p class="text">
						In order to better capture an example of how a user might interact with PET in one specific scenario, the narrative storyboard depicting Zachary, our primary persona, and his interaction with PET. In this case, Zachary spends his morning/early afternoon in a variety of activities, only able to interact with the app in a sparse manner. Nonetheless, the app supports his varying abilities to engage and still presents him with as much analysis as it can, with the engagement data heavily supplemented by automatically-gathered data input.
					</p><br>
					<img src="../../files/pet/Frame 3.png" alt="" width="100%">
				</li>
				<li>
					KEY FUNCTIONALITIES
					key functionalities
					<br>
					<div class="row">
						<img src="../../files/pet/functionalities.png" alt="" width="100%">
					</div>
					<span class="title4">
						MULTI-MODAL ENGAGEMENT
						multi-modal engagement
					</p>
					<p class="text">
						The app offer three different forms of interaction with the application: One-Touch (simply tap a smiley face to log mood), Survey (answer a paginated questionnaire) and Chatbot (converse with the animal "avatar"). Each of these interaction methods correlate to the relative amount of effort required to engage with each one, and is structured in this way to provide what I believe to be a good range of efforts that users might be willing to expend.
					</p>
					<span class="title4">
						PERSONAL CONTEXT INTEGRATION
						personal context integration
					</span>
					<p class="text">
						PET performs integration of personal context primarily through automatic generation and population of activity and event data based on information provided by other applications. These other applications might range from the basic iOS calendar app or other similar scheduling apps such as Google Calendar to the more involved, such as the diet-centered MyFitnessPal.
					</p>
					<span class="title4">
						EFFICIENT REFLECTIONS AND INTERVENTIONS
						efficient reflections and interventions
					</span>
					<p class="text">
						PET supports the efficient reflections and interventions primarily through natural language-based sentiments. What this means specifically is that reflections and interventions are given using simple, one-sentence summaries in natural language, such as "you’ve been feeling ’quite good’ today so far" for mood feedback or "you’ve walked ’significantly more than average’ today than in the past week."
					</p>
					<span class="title4">
						PERSONALIZATION AND CUSTOMIZATION
						personalization and customization
					</span>
					<p class="text">
						a. Avatar Customization: Avatar customization represents the most standalone feature, but also
						the most personalizable. In this specific feature, users will have the option to change their avatar
						to an animal of their liking, as well as customize the color palette that the animal exhibits.
						<br>b. Ambient Feedback: After an avatar has been customized, this unique aspect of PET can be employed to provide ambient feedback to the user in the form of the avatar itself. Depending on the mood extracted at any given time, the avatar itself can reflect the mood of the user, changing characteristics as basic as the color the avatar or physical expressions of the animal itself.
						<br>c. Seamless Reflection and Intervention: Finally, the most nuanced and complex feature of this app is integrating the "efficient feedback and intervention" into chatbot/avatar features. More specifically, the chatbot might offer certain reflections of the user’s data during engagement with the chatbot or make suggestions about interventions that the user might consider taking, such as doing an activity that has been associated with better moods for that specific user.
					</p>
